<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>效果预览</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    #base {
      display: block;
      width: 100%;
      height: auto;
      position: relative;
      top: 0;
    }
    #gif {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: auto;
      display: none;
    }
    #waiting {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #8b9bb5;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      text-align: center;
      padding: 2rem;
      background: #000;
    }
    .dot-spin {
      width: 36px;
      height: 36px;
      border: 3px solid #2a3548;
      border-top-color: #3d8bfd;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="stage" style="display:none">
    <img id="base" alt="" />
    <img id="gif" alt="" />
  </div>
  <div id="waiting">
    <div class="dot-spin"></div>
    <p>等待电脑端推送预览…</p>
    <p style="font-size:0.8rem;color:#4a5568;margin-top:0.5rem">请确保手机与电脑在同一 Wi-Fi 下</p>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const baseImg = document.getElementById("base");
    const gifImg = document.getElementById("gif");
    const waiting = document.getElementById("waiting");

    let baseBlobUrl = null;
    let gifBlobUrl = null;

    function revoke(url) {
      if (url && url.startsWith("blob:")) URL.revokeObjectURL(url);
    }

    function b64ToBlob(b64, mime) {
      const bytes = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
      return new Blob([bytes], { type: mime });
    }

    function applyPayload(data) {
      if (data.base) {
        revoke(baseBlobUrl);
        baseBlobUrl = URL.createObjectURL(b64ToBlob(data.base.b64, data.base.mime || "image/png"));
        baseImg.src = baseBlobUrl;
      }
      if (data.gif) {
        revoke(gifBlobUrl);
        gifBlobUrl = URL.createObjectURL(b64ToBlob(data.gif.b64, "image/gif"));
        gifImg.src = gifBlobUrl;
        gifImg.style.display = "block";
      } else {
        gifImg.style.display = "none";
      }
      stage.style.display = "flex";
      waiting.style.display = "none";
    }

    function connect() {
      const es = new EventSource("/preview-sse");
      es.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === "preview-update") applyPayload(data);
        } catch {}
      };
      es.onerror = () => {
        es.close();
        setTimeout(connect, 3000); // auto-reconnect
      };
    }

    connect();
  </script>
</body>
</html>
